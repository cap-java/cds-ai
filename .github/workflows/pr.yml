name: CI - PR

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

on:
  workflow_dispatch:
  pull_request:
    branches: [main, review-fixes]
    types: [reopened, synchronize, opened]

jobs:
  build-and-test:
    uses: ./.github/workflows/pipeline.yml
    secrets: inherit
