name: Bind Cloud Foundry Services
description: Login to CF and bind the AI Core service for hybrid testing via cds bind.

inputs:
  cf-api:
    description: Cloud Foundry API endpoint
    required: true
  cf-username:
    description: Cloud Foundry username
    required: true
  cf-password:
    description: Cloud Foundry password
    required: true
  cf-org:
    description: Cloud Foundry organization
    required: true
  cf-space:
    description: Cloud Foundry space
    required: true

runs:
  using: composite
  steps:
    - name: Install CF CLI
      shell: bash
      env:
        CF_CLI_VERSION: '8.18.3'
      run: |
        wget -q "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=${CF_CLI_VERSION}&source=github-rel" -O cf-cli.tar.gz
        tar -xzf cf-cli.tar.gz
        sudo mv cf8 /usr/local/bin/cf
        cf --version

    - name: CF Login
      shell: bash
      env:
        CF_USERNAME: ${{ inputs.cf-username }}
        CF_PASSWORD: ${{ inputs.cf-password }}
        CF_API: ${{ inputs.cf-api }}
        CF_ORG: ${{ inputs.cf-org }}
        CF_SPACE: ${{ inputs.cf-space }}
      run: |
        for i in {1..5}; do
          cf api "$CF_API" && \
          cf auth && \
          cf target -o "$CF_ORG" -s "$CF_SPACE" && break
          if [ "$i" -eq 5 ]; then
            echo "cf login failed after 5 attempts."
            exit 1
          fi
          echo "cf login failed, retrying ($i/5)..."
          sleep 10
        done

    - name: Install @sap/cds-dk
      shell: bash
      run: |
        npm i -g @sap/cds-dk@9.9.1
        echo "$(npm config get prefix)/bin" >> "${GITHUB_PATH}"

    - name: Install CDS dependencies
      shell: bash
      run: npm ci || npm install
      working-directory: integration-tests

    - name: Bind ai-core
      shell: bash
      working-directory: integration-tests
      run: |
        for i in {1..5}; do
          cds bind ai-core && break
          if [ "$i" -eq 5 ]; then
            echo "cds bind ai-core failed after 5 attempts."
            exit 1
          fi
          echo "cds bind ai-core failed, retrying ($i/5)..."
          sleep 30
        done
